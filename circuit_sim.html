<script>
// ══════════════════════════════════════════════════════
// 1. Core Setup & Camera 
// ══════════════════════════════════════════════════════
const canvas = document.getElementById('simCanvas');
const ctx = canvas.getContext('2d');
let WIDTH = window.innerWidth;
let HEIGHT = window.innerHeight;
canvas.width = WIDTH;
canvas.height = HEIGHT;
 
const microCanvas = document.getElementById('micro-canvas');
const microCtx = microCanvas.getContext('2d');
 
let camera = { x: WIDTH/2, y: HEIGHT/2, zoom: 1 };
const GRID_SIZE = 20;
 
let appMode = 'edit'; 
 
window.toggleMode = function() {
    const btn = document.getElementById('mode-toggle');
    if (appMode === 'edit') {
        appMode = 'wire';
        btn.innerHTML = '🔌 Mode: Wire';
        btn.style.background = '#10b981'; 
        btn.style.borderColor = '#047857';
        select(null); 
        logEvent("Switched to Wiring Mode");
    } else {
        appMode = 'edit';
        btn.innerHTML = '✋ Mode: Move & Edit';
        btn.style.background = '#3b82f6'; 
        btn.style.borderColor = 'rgba(255,255,255,0.2)';
        actionState.activeNode = null;
        actionState.tempPos = null;
        logEvent("Switched to Edit Mode");
    }
}
 
window.addEventListener('resize', () => {
    WIDTH = window.innerWidth; HEIGHT = window.innerHeight;
    canvas.width = WIDTH; canvas.height = HEIGHT;
});
 
const COLORS = {
    BG: "#121419", GRID: "#1c2028", WIRE: "#969696", ELECTRON: "#ffff32",
    SELECTED: "#00ff96", POSITIVE: "#ef4444", NEGATIVE: "#3b82f6",
    NODE: "#475569", NODE_CONN: "#00ff96"
};
 
CanvasRenderingContext2D.prototype.roundRect = function(x,y,w,h,r){
    if(w<2*r)r=w/2; if(h<2*r)r=h/2;
    this.beginPath(); this.moveTo(x+r,y); this.arcTo(x+w,y,x+w,y+h,r);
    this.arcTo(x+w,y+h,x,y+h,r); this.arcTo(x,y+h,x,y,r); this.arcTo(x,y,x+w,y,r);
    this.closePath(); return this;
};
 
function logEvent(msg) {
    const logs = document.getElementById('logs');
    const el = document.createElement('div');
    el.className = 'log-msg'; el.innerText = "> " + msg;
    logs.appendChild(el);
    setTimeout(() => el.remove(), 4000);
}
 
function screenToWorld(x, y) {
    return { x: (x - camera.x) / camera.zoom, y: (y - camera.y) / camera.zoom };
}
function snap(val) { return Math.round(val / GRID_SIZE) * GRID_SIZE; }
 
const DIELECTRICS = {
    "vacuum":  { name: "Vacuum", er: 1.0, polar: false, color: "#1c2028" },
    "air":     { name: "Air", er: 1.0006, polar: false, color: "#78aadf" },
    "paper":   { name: "Paper", er: 3.7, polar: true, color: "#e6dcbe" },
    "mica":    { name: "Mica", er: 5.4, polar: false, color: "#aaaaab" },
    "glass":   { name: "Glass", er: 6.5, polar: true, color: "#aadece" },
    "ceramic": { name: "Ceramic", er: 8.5, polar: true, color: "#dcc8aa" },
    "water":   { name: "Distilled Water", er: 80.1, polar: true, color: "#4682dc" }
};
const EPSILON_0 = 8.854e-12;
 
// ══════════════════════════════════════════════════════
// 2. Nodes & Wires
// ══════════════════════════════════════════════════════
class Node {
    constructor(parent, ox, oy) {
        this.parent = parent; this.ox = ox; this.oy = oy;
        this.x = 0; this.y = 0; this.voltage = 0;
        this.connections = []; this.isFixed = false;
    }
    updatePos() {
        let cx = this.parent.x + this.parent.w/2;
        let cy = this.parent.y + this.parent.h/2;
        let rot = this.parent.rotation;
        let rotatedOx = this.ox; let rotatedOy = this.oy;
        
        if (rot === 90)  { rotatedOx = -this.oy; rotatedOy = this.ox; }
        if (rot === 180) { rotatedOx = -this.ox; rotatedOy = -this.oy; }
        if (rot === 270) { rotatedOx = this.oy;  rotatedOy = -this.ox; }
 
        this.x = snap(cx + rotatedOx);
        this.y = snap(cy + rotatedOy);
    }
    draw(ctx) {
        ctx.fillStyle = this.connections.length > 0 ? COLORS.NODE_CONN : COLORS.NODE;
        ctx.beginPath(); ctx.arc(this.x, this.y, 7/camera.zoom, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = "white"; ctx.lineWidth = 2/camera.zoom; ctx.stroke();
    }
    checkHit(pos) { return Math.hypot(pos.x - this.x, pos.y - this.y) < 40/camera.zoom; }
}
 
class Wire {
    constructor(nA, nB) {
        this.nodeA = nA; this.nodeB = nB;
        this.resistance = 0.01; 
        this.current = 0; this.elOffset = 0;
    }
    getPoints() {
        let mx = snap((this.nodeA.x + this.nodeB.x)/2);
        return [ {x:this.nodeA.x, y:this.nodeA.y}, {x:mx, y:this.nodeA.y}, {x:mx, y:this.nodeB.y}, {x:this.nodeB.x, y:this.nodeB.y} ];
    }
    draw(ctx) {
        let pts = this.getPoints();
        ctx.strokeStyle = COLORS.WIRE; ctx.lineWidth = 5;
        ctx.beginPath(); ctx.moveTo(pts[0].x, pts[0].y);
        for(let i=1;i<pts.length;i++) ctx.lineTo(pts[i].x, pts[i].y);
        ctx.stroke();
 
        if (Math.abs(this.current) > 0.01) {
            let speed = Math.min(Math.abs(this.current)*3, 20);
            this.elOffset = (this.elOffset + speed) % 30;
            let dir = this.current > 0 ? 1 : -1;
            ctx.fillStyle = COLORS.ELECTRON;
            let totalL = Math.abs(pts[1].x-pts[0].x) + Math.abs(pts[2].y-pts[1].y) + Math.abs(pts[3].x-pts[2].x);
            for(let d=this.elOffset; d<totalL; d+=30) {
                let pd = dir > 0 ? d : totalL - d;
                let p = this.getPointAt(pts, pd);
                ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI*2); ctx.fill();
            }
        }
    }
    getPointAt(pts, d) {
        let l1 = Math.abs(pts[1].x-pts[0].x);
        if(d<=l1) return {x: pts[0].x + Math.sign(pts[1].x-pts[0].x)*d, y: pts[0].y};
        let l2 = Math.abs(pts[2].y-pts[1].y);
        if(d<=l1+l2) return {x: pts[1].x, y: pts[1].y + Math.sign(pts[2].y-pts[1].y)*(d-l1)};
        return {x: pts[2].x + Math.sign(pts[3].x-pts[2].x)*(d-l1-l2), y: pts[2].y};
    }
    checkHit(pos) {
        let pts = this.getPoints();
        for(let i=0;i<pts.length-1;i++) {
            let x1=pts[i].x, y1=pts[i].y, x2=pts[i+1].x, y2=pts[i+1].y;
            let minX = Math.min(x1,x2)-25, maxX = Math.max(x1,x2)+25;
            let minY = Math.min(y1,y2)-25, maxY = Math.max(y1,y2)+25;
            if(pos.x>=minX && pos.x<=maxX && pos.y>=minY && pos.y<=maxY) return true;
        }
        return false;
    }
}
 
// ══════════════════════════════════════════════════════
// 3. Components 
// ══════════════════════════════════════════════════════
class Component {
    constructor(x, y, w, h, name) {
        this.x = snap(x); this.y = snap(y); this.w = snap(w); this.h = snap(h);
        this.name = name; this.nodes = [];
        this.rotation = 0; 
        this.current = 0; this.voltageDrop = 0; this.power = 0; this.resistance = 10;
        this.isSelected = false; this.isBurnt = false;
        this.maxPower = 500; 
        this.originalResistance = this.resistance;
    }
    updateNodes() { this.nodes.forEach(n => n.updatePos()); }
    drawSelection(ctx) {
        if(this.isSelected) {
            ctx.strokeStyle = COLORS.SELECTED; ctx.lineWidth = 2; ctx.setLineDash([4,4]);
            ctx.strokeRect(-this.w/2 - 5, -this.h/2 - 5, this.w + 10, this.h + 10);
            ctx.setLineDash([]);
        }
    }
    beginDraw(ctx) {
        ctx.save();
        ctx.translate(this.x + this.w/2, this.y + this.h/2);
        ctx.rotate(this.rotation * Math.PI / 180);
    }
    drawBurntMark(ctx) {
        if(this.isBurnt) {
            ctx.fillStyle = "rgba(0,0,0,0.85)";
            ctx.beginPath(); ctx.arc(0, 0, this.h/2 + 5, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "#ef4444"; ctx.font = "bold 14px sans-serif";
            ctx.fillText("BURNT", -22, 5);
        }
    }
    endDraw(ctx) {
        this.drawBurntMark(ctx);
        this.drawSelection(ctx);
        ctx.restore();
        this.nodes.forEach(n => n.draw(ctx));
    }
    checkHit(pos) {
        let hw = (this.rotation % 180 === 0) ? this.w/2 : this.h/2;
        let hh = (this.rotation % 180 === 0) ? this.h/2 : this.w/2;
        let cx = this.x + this.w/2; let cy = this.y + this.h/2;
        return pos.x >= cx-hw && pos.x <= cx+hw && pos.y >= cy-hh && pos.y <= cy+hh;
    }
}
 
class Battery extends Component {
    constructor(x,y) {
        super(x,y, 80, 100, "Battery");
        this.voltage = 12.0; this.internal_r = 0.1; 
        this.nodes.push(new Node(this, 0, -50), new Node(this, 0, 50));
        this.updateNodes();
    }
    draw(ctx) {
        this.beginDraw(ctx);
        ctx.fillStyle = "#2d3748"; ctx.roundRect(-40, -50, 80, 100, 8).fill();
        ctx.fillStyle = "#d69e2e"; ctx.roundRect(-40, -50, 80, 20, 8).fill(); 
        ctx.fillStyle = "white"; ctx.font = "bold 16px sans-serif";
        ctx.fillText("+", -5, -35); ctx.fillText("-", -5, 45);
        ctx.fillStyle = "#00ff96"; ctx.font = "bold 14px monospace";
        ctx.fillText(`${this.voltage}V`, -18, 5);
        this.endDraw(ctx);
    }
}
 
class Resistor extends Component {
    constructor(x,y) {
        super(x,y, 100, 30, "Resistor");
        this.resistance = 10;
        this.originalResistance = 10;
        this.maxPower = 100; 
        this.nodes.push(new Node(this, -50, 0), new Node(this, 50, 0));
        this.updateNodes();
    }
    draw(ctx) {
        this.beginDraw(ctx);
        ctx.fillStyle = "#dcb482"; ctx.roundRect(-30, -15, 60, 30, 10).fill();
        ctx.strokeStyle = "#999"; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.moveTo(-50,0); ctx.lineTo(-30,0); ctx.moveTo(30,0); ctx.lineTo(50,0); ctx.stroke();
        
        ctx.fillStyle = "black"; ctx.fillRect(-20, -15, 5, 30); ctx.fillRect(-10, -15, 5, 30); ctx.fillStyle = "red"; ctx.fillRect(15, -15, 5, 30);
        
        if(!this.isBurnt) {
            ctx.fillStyle = "white"; ctx.font = "bold 12px monospace";
            let txt = this.resistance >= 1000000 ? (this.resistance/1000000).toFixed(1)+"MΩ" : (this.resistance >= 1000 ? (this.resistance/1000).toFixed(1)+"kΩ" : this.resistance+"Ω");
            ctx.fillText(txt, -20, -22);
        }
        this.endDraw(ctx);
    }
}
 
class Bulb extends Component {
    constructor(x,y) {
        super(x,y, 60, 60, "Bulb");
        this.resistance = 15;
        this.originalResistance = 15;
        this.maxPower = 200; 
        this.nodes.push(new Node(this, -30, 20), new Node(this, 30, 20));
        this.updateNodes();
    }
    draw(ctx) {
        this.beginDraw(ctx);
        let I = Math.min(Math.abs(this.current)/0.5, 1.2); 
        
        if (I > 0.05 && !this.isBurnt) {
            let grad = ctx.createRadialGradient(0, -10, 0, 0, -10, 40*I);
            grad.addColorStop(0, `rgba(255,255,100,${0.8*I})`);
            grad.addColorStop(1, 'rgba(255,150,0,0)');
            ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(0, -10, 40*I, 0, Math.PI*2); ctx.fill();
        }
        
        ctx.fillStyle = "#64748b"; ctx.fillRect(-15, 15, 30, 15);
        ctx.strokeStyle = I > 0.1 && !this.isBurnt ? "#ffea00" : "#94a3b8";
        ctx.fillStyle = I > 0.1 && !this.isBurnt ? `rgba(255,255,150,${0.2+I*0.4})` : "rgba(255,255,255,0.05)";
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(0, -10, 25, 0.2*Math.PI, 0.8*Math.PI, true);
        ctx.lineTo(-15, 15); ctx.lineTo(15, 15); ctx.closePath(); ctx.fill(); ctx.stroke();
        
        ctx.strokeStyle = I > 0.1 && !this.isBurnt ? "white" : "#444";
        if(!this.isBurnt) {
            ctx.beginPath(); ctx.moveTo(-10, 15); ctx.lineTo(-5, -5); ctx.lineTo(5, -5); ctx.lineTo(10, 15); ctx.stroke();
        }
        this.endDraw(ctx);
    }
}
 
class Capacitor extends Component {
    constructor(x,y) {
        super(x,y, 80, 60, "Capacitor");
        this.plateA = 2.0; this.plateD = 2.0; 
        this.matKey = "air";
        this.charge = 0; 
        this.resistance = 1e12; 
        this.originalResistance = 1e12;
        this.esr = 0.1; 
        this.R_eq = 1e12; 
        this.maxPower = 1000;
        this.nodes.push(new Node(this, -40, 0), new Node(this, 40, 0));
        this.recalc(); this.updateNodes();
    }
    recalc() {
        let mat = DIELECTRICS[this.matKey];
        let area = Math.max(0.01, Math.abs(this.plateA));
        let gap = Math.max(0.01, Math.abs(this.plateD));
        this.plateA = area; this.plateD = gap;
        const VISUAL_SCALE = 1e11; 
        this.capacitance = mat.er * EPSILON_0 * area / (gap * 1e-3) * VISUAL_SCALE;
    }
    draw(ctx) {
        this.beginDraw(ctx);
        let mat = DIELECTRICS[this.matKey];
        
        ctx.strokeStyle = COLORS.WIRE; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.moveTo(-40, 0); ctx.lineTo(-15, 0); ctx.moveTo(15, 0); ctx.lineTo(40, 0); ctx.stroke();
        
        ctx.fillStyle = mat.color; ctx.fillRect(-12, -25, 24, 50);
        
        ctx.strokeStyle = "#cbd5e1"; ctx.lineWidth = 4;
        ctx.beginPath(); ctx.moveTo(-12, -28); ctx.lineTo(-12, 28); ctx.moveTo(12, -28); ctx.lineTo(12, 28); ctx.stroke();
        
        let vc = this.capacitance > 0 ? this.charge / this.capacitance : 0;
        let E = Math.min(Math.abs(vc)/12, 1);
        if(E > 0.05 && !this.isBurnt) {
            ctx.strokeStyle = `rgba(255,255,0,${0.3+0.7*E})`; ctx.lineWidth = 1.5;
            let dir = vc > 0 ? 1 : -1;
            for(let i=0; i<5; i++) {
                let yy = -20 + i*10;
                ctx.beginPath(); 
                if(dir>0) { ctx.moveTo(-9, yy); ctx.lineTo(9, yy); ctx.lineTo(4, yy-3); }
                else { ctx.moveTo(9, yy); ctx.lineTo(-9, yy); ctx.lineTo(-4, yy-3); }
                ctx.stroke();
            }
        }
        
        if(!this.isBurnt) {
            ctx.fillStyle = "#00ff96"; ctx.font = "bold 12px monospace";
            ctx.fillText(`${Math.abs(vc).toFixed(1)}V`, -18, 45);
        }
        this.endDraw(ctx);
    }
}

// ══════════════════════════════════════════════════════
// 4. Physics Engine (Highly Stable & Accurate Gauss-Seidel)
// ══════════════════════════════════════════════════════
class Physics {
    static buildGraph(comps, wires) {
        let allNodes = [];
        comps.forEach(c => {
            allNodes.push(...c.nodes);
            c.nodes.forEach(n => { n.connections = []; n.isFixed = false; });
        });
        
        comps.forEach(c => {
            if(c.nodes.length===2) {
                let r = c.resistance;
                if(c instanceof Battery) r = c.internal_r; 
                if(c instanceof Capacitor) r = c.R_eq;
                
                c.nodes[0].connections.push({n: c.nodes[1], res: r, comp: c});
                c.nodes[1].connections.push({n: c.nodes[0], res: r, comp: c});
            }
        });
        
        wires.forEach(w => {
            if(comps.some(c => c.nodes.includes(w.nodeA)) && comps.some(c => c.nodes.includes(w.nodeB))) {
                w.nodeA.connections.push({n: w.nodeB, res: w.resistance, comp: w});
                w.nodeB.connections.push({n: w.nodeA, res: w.resistance, comp: w});
            }
        });
        return allNodes;
    }
 
    static relax(allNodes, comps) {
        let batteries = comps.filter(c => c instanceof Battery && !c.isBurnt);
        if(batteries.length > 0) {
            batteries[0].nodes[1].voltage = 0; batteries[0].nodes[1].isFixed = true;
            batteries[0].nodes[0].voltage = batteries[0].voltage; batteries[0].nodes[0].isFixed = true;
        } else if(allNodes.length > 0) {
            allNodes[0].voltage = 0; allNodes[0].isFixed = true;
        }
        
        let varNodes = allNodes.filter(n => !n.isFixed);
        let omega = 1.5; 
        
        for(let iter=0; iter<800; iter++) { 
            varNodes.forEach(node => {
                let sv=0, sr=0;
                sv += 0; 
                sr += 1e-9; 
 
                node.connections.forEach(conn => {
                    if(conn.res > 0 && conn.res < 1e11) { 
                        if(conn.comp instanceof Capacitor && !conn.comp.isBurnt) {
                            let vc = conn.comp.capacitance > 0 ? conn.comp.charge / conn.comp.capacitance : 0;
                            let sign = node === conn.comp.nodes[0] ? 1 : -1;
                            sv += (conn.n.voltage + (sign * vc)) / conn.res;
                        } else {
                            sv += conn.n.voltage / conn.res;
                        }
                        sr += 1/conn.res;
                    }
                });
                if(sr>0) {
                    let v_new = sv/sr;
                    let blended = (1 - omega) * node.voltage + omega * v_new; 
                    node.voltage = isFinite(blended) ? Math.max(-100000, Math.min(100000, blended)) : 0;
                }
            });
        }
    }
 
    static step(comps, wires, dt) {
        comps.forEach(c => {
            if (c instanceof Capacitor) {
                c.R_eq = c.capacitance > 0 ? c.esr + (dt / c.capacitance) : 1e12;
            }
        });
 
        let nodes = this.buildGraph(comps, wires);
        this.relax(nodes, comps);
 
        comps.forEach(c => {
            if(c.nodes.length < 2) return;
            
            if (c.isBurnt) {
                c.current = 0; c.voltageDrop = 0; c.power = 0; return; 
            }
 
            c.voltageDrop = c.nodes[0].voltage - c.nodes[1].voltage;
            
            let r = c.resistance;
            if(c instanceof Battery) r = c.internal_r;
 
            if (c instanceof Capacitor) {
                let vc = c.capacitance > 0 ? c.charge / c.capacitance : 0;
                c.current = (c.voltageDrop - vc) / c.R_eq;
                c.charge += c.current * dt;
                
                if (Math.abs(c.charge) < 1e-12) c.charge = 0;
                c.power = Math.abs(c.voltageDrop * c.current);
            } else {
                c.current = r > 0 ? c.voltageDrop / r : 0;
                c.power = Math.abs(c.voltageDrop * c.current);
            }
 
            if (c instanceof Fuse && Math.abs(c.current) > c.maxCurrent) {
                c.isBurnt = true; c.resistance = 1e12; 
                logEvent("Fuse Blown! Circuit Protected.");
            } 
            else if (!(c instanceof Battery) && !(c instanceof Switch) && !(c instanceof Voltmeter) && !(c instanceof Ammeter) && c.power > c.maxPower) {
                c.isBurnt = true; 
                c.resistance = 1e12; 
                logEvent(`💥 ${c.name} Exploded!`);
            }
        });
 
        wires.forEach(w => {
            w.current = w.resistance > 0 ? (w.nodeA.voltage - w.nodeB.voltage) / w.resistance : 0;
        });
    }
}

// 5. App State & UI Interaction
// ══════════════════════════════════════════════════════
let components = [];
let wires = [];
let selectedComp = null;
let selectedWire = null;
let actionState = { dragging: null, activeNode: null, tempPos: null, offsetX: 0, offsetY: 0 };
 
const TOOLS = [
    {name: "Battery", class: Battery, col: "#d69e2e"},
    {name: "Resistor", class: Resistor, col: "#dcb482"},
    {name: "Bulb", class: Bulb, col: "#ffff32"},
    {name: "Capacitor", class: Capacitor, col: "#3b82f6"},
    {name: "Switch", class: Switch, col: "#94a3b8"},
    {name: "Fuse", class: Fuse, col: "#bae6fd"},
    {name: "Magnet", class: Electromagnet, col: "#b45309"},
    {name: "Ammeter", class: Ammeter, col: "#ef4444"},
    {name: "Voltmeter", class: Voltmeter, col: "#3b82f6"}
];
 
function initUI() {
    let tc = document.getElementById('tools-container');
    TOOLS.forEach(t => {
        let btn = document.createElement('button');
        btn.className = 'tool-btn';
        btn.innerHTML = `<div class="tool-color" style="background:${t.col};"></div> ${t.name}`;
        btn.onclick = () => spawn(t.class, true);
        tc.appendChild(btn);
    });
}
 
function spawn(ClassRef, randOffset = true) {
    let ox = randOffset ? (Math.random()*60 - 30) : 0;
    let oy = randOffset ? (Math.random()*60 - 30) : 0;
    let spawnPt = screenToWorld(WIDTH/2 + ox, HEIGHT/2 + oy);
    let comp = new ClassRef(spawnPt.x - 30, spawnPt.y - 30);
    components.push(comp);
    
    if(appMode === 'wire') toggleMode();
    
    select(comp);
    logEvent(`Spawned ${comp.name}`);
}
 
function select(c, w = null) {
    if(selectedComp) selectedComp.isSelected = false;
    selectedComp = c;
    selectedWire = w;
    
    const panel = document.getElementById('prop-controls');
    const msg = document.getElementById('no-selection');
    const dProps = document.getElementById('dynamic-props');
    const btnInspect = document.getElementById('btn-inspect');
    const btnFlip = document.getElementById('btn-flip');
    const statsBox = document.getElementById('stats-box');
    const dashboard = document.getElementById('dashboard');
    const toggleRightBtn = document.getElementById('toggle-right');
    
    if(c || w) {
        dashboard.classList.remove('collapsed');
        toggleRightBtn.classList.remove('collapsed');
        toggleRightBtn.innerText = '▶';
    }
 
    if(c) {
        c.isSelected = true;
        panel.style.display = 'block'; msg.style.display = 'none';
        document.getElementById('comp-title').innerText = c.name;
        dProps.innerHTML = "";
        btnInspect.style.display = 'none';
        btnFlip.style.display = 'block';
        statsBox.style.display = 'block';
 
        if(c instanceof Battery) {
            dProps.innerHTML = `
                <div class="prop-group"><label>Voltage (V)</label>
                <input type="number" class="prop-input" value="${c.voltage}" onchange="updateProp('voltage', this.value)"></div>
                <div class="prop-group"><label>Internal Res. (Ω)</label>
                <input type="number" step="0.001" class="prop-input" value="${c.internal_r}" onchange="updateProp('internal_r', this.value)"></div>
            `;
        } else if(c instanceof Fuse) {
            dProps.innerHTML = `
                <div class="prop-group"><label>Blow Current Limit (A)</label>
                <input type="number" step="0.1" class="prop-input" value="${c.maxCurrent}" onchange="updateProp('maxCurrent', this.value)"></div>
            `;
        } else if(c instanceof Resistor || c instanceof Bulb || c instanceof Electromagnet) {
            dProps.innerHTML = `
                <div class="prop-group"><label>Resistance (Ω)</label>
                <input type="number" class="prop-input" value="${c.originalResistance}" onchange="updateProp('resistance', this.value)"></div>
                <div class="prop-group"><label>Max Power Limit (W)</label>
                <input type="number" class="prop-input" value="${c.maxPower}" onchange="updateProp('maxPower', this.value)"></div>
            `;
        } else if(c instanceof Capacitor) {
            btnInspect.style.display = 'block';
            let opts = Object.keys(DIELECTRICS).map(k => `<option value="${k}" ${c.matKey===k?'selected':''}>${DIELECTRICS[k].name}</option>`).join('');
            dProps.innerHTML = `
                <div class="prop-group"><label>Area (m²)</label>
                <input type="number" step="0.1" class="prop-input" value="${c.plateA}" onchange="updateCap('plateA', this)"></div>
                <div class="prop-group"><label>Gap (mm)</label>
                <input type="number" step="0.1" class="prop-input" value="${c.plateD}" onchange="updateCap('plateD', this)"></div>
                <div class="prop-group"><label>Dielectric</label>
                <select onchange="updateCap('matKey', this.value)">${opts}</select></div>
                <div class="prop-group"><label>Max Power (W)</label>
                <input type="number" class="prop-input" value="${c.maxPower}" onchange="updateProp('maxPower', this.value)"></div>
            `;
        } else if(c instanceof Switch) {
            dProps.innerHTML = `<button class="action-btn" style="background:#00ff96; color:black; width:100%;" onclick="selectedComp.toggle()">Toggle Switch</button>`;
        }
        
        if (c.isBurnt) {
             dProps.innerHTML += `<button class="action-btn" style="background:#f59e0b; color:white; width:100%; margin-top:10px;" onclick="repairSelected()">Repair Component</button>`;
        }
    } else if (w) {
        panel.style.display = 'block'; msg.style.display = 'none';
        document.getElementById('comp-title').innerText = "Wire Selected";
        dProps.innerHTML = `<p style="color:#00ff96; text-align:center; font-size:13px; margin-bottom:15px;">Click Delete below to remove this wire.</p>`;
        btnInspect.style.display = 'none';
        btnFlip.style.display = 'none'; 
        statsBox.style.display = 'none';
    } else {
        panel.style.display = 'none'; msg.style.display = 'block';
    }
}
 
window.updateProp = function(prop, val) {
    if(selectedComp) { 
        let num = parseFloat(val);
        if(isNaN(num)) num = 0.001;
        selectedComp[prop] = num; 
        if(prop === 'resistance' && num > 0) selectedComp.originalResistance = num; 
    }
};
 
window.updateCap = function(prop, val) {
    if(selectedComp) { 
        if(prop==='matKey') {
            selectedComp.matKey = val;
        } else {
            let num = parseFloat(val.value);
            if(isNaN(num) || num <= 0) num = 0.1; // منع الأخطاء الرياضية والحذف
            val.value = num;
            selectedComp[prop] = num;
        }
        selectedComp.recalc(); 
    }
};
 
window.repairSelected = function() {
    if(selectedComp && selectedComp.isBurnt) {
        selectedComp.isBurnt = false;
        selectedComp.resistance = selectedComp.originalResistance;
        logEvent(`${selectedComp.name} Repaired!`);
        select(selectedComp); 
    }
}
 
window.flipSelected = function() {
    if(selectedComp) { 
        selectedComp.rotation = (selectedComp.rotation + 90) % 360; 
        selectedComp.updateNodes(); 
        logEvent("Component Rotated");
    }
};
 
window.deleteSelected = function() {
    if(selectedComp) {
        wires = wires.filter(w => !selectedComp.nodes.includes(w.nodeA) && !selectedComp.nodes.includes(w.nodeB));
        components = components.filter(c => c !== selectedComp);
        select(null); logEvent("Component Deleted");
    }
    if(selectedWire) {
        wires = wires.filter(w => w !== selectedWire);
        select(null); logEvent("Wire Deleted");
    }
};
 
window.addEventListener('keydown', e => {
    if(e.key.toLowerCase() === 'r') flipSelected();
    if(e.key === 'Delete' || e.key === 'Backspace') deleteSelected();
});
 
window.toggleLeft = function() {
    let tb = document.getElementById('toolbar'); let btn = document.getElementById('toggle-left');
    tb.classList.toggle('collapsed'); btn.classList.toggle('collapsed');
    btn.innerText = tb.classList.contains('collapsed') ? '▶' : '◀';
};
window.toggleRight = function() {
    let db = document.getElementById('dashboard'); let btn = document.getElementById('toggle-right');
    db.classList.toggle('collapsed'); btn.classList.toggle('collapsed');
    btn.innerText = db.classList.contains('collapsed') ? '◀' : '▶';
};
 
// ══════════════════════════════════════════════════════
// 6. Touch & Mouse Events (Z-Index Fixed)
// ══════════════════════════════════════════════════════
let isPanning = false; let lastPan = {x:0, y:0};
let pointers = new Map();
 
canvas.addEventListener('pointerdown', e => {
    if(e.target.closest('.panel') || e.target.closest('.toggle-btn') || e.target.closest('#micro-modal') || e.target.closest('#mode-toggle')) return;
    
    e.preventDefault(); pointers.set(e.pointerId, {x: e.clientX, y: e.clientY});
    
    if(pointers.size === 2 || e.button === 1 || e.button === 2) { 
        isPanning = true; lastPan = {x: e.clientX, y: e.clientY}; return; 
    }
    
    let pos = screenToWorld(e.clientX, e.clientY);
    
    if (appMode === 'wire') {
        for(let i = components.length - 1; i >= 0; i--) {
            let c = components[i];
            for(let n of c.nodes) {
                if(n.checkHit(pos)) { actionState.activeNode = n; actionState.tempPos = pos; return; }
            }
        }
        for(let w of wires) {
            if(w.checkHit(pos)) { select(null, w); return; }
        }
        select(null);
    } 
    else {
        // حلقة معكوسة لضمان تحديد القطعة العلوية دائماً
        for(let i = components.length - 1; i >= 0; i--) {
            let c = components[i];
            if(c.checkHit(pos)) {
                if(c instanceof Switch) c.toggle();
                select(c); 
                actionState.dragging = c;
                actionState.offsetX = pos.x - c.x; 
                actionState.offsetY = pos.y - c.y;
                
                // تقديم القطعة للأمام برمجياً
                components.splice(i, 1);
                components.push(c);
                return;
            }
        }
        for(let w of wires) {
            if(w.checkHit(pos)) { select(null, w); return; }
        }
        select(null);
    }
});
 
canvas.addEventListener('pointermove', e => {
    if(e.target.closest('.panel') || e.target.closest('.toggle-btn') || e.target.closest('#mode-toggle')) return;
    e.preventDefault();
    if(!pointers.has(e.pointerId)) return;
    pointers.set(e.pointerId, {x: e.clientX, y: e.clientY});
 
    if(isPanning || pointers.size === 2) {
        if(pointers.size === 2) {
            let pts = Array.from(pointers.values());
            let currentDist = Math.hypot(pts[0].x - pts[1].x, pts[0].y - pts[1].y);
            if(camera.lastPinchDist) {
                let zoomFactor = currentDist / camera.lastPinchDist;
                camera.zoom = Math.max(0.4, Math.min(4, camera.zoom * zoomFactor));
            }
            camera.lastPinchDist = currentDist;
        } else if (isPanning) {
            camera.x += e.clientX - lastPan.x; camera.y += e.clientY - lastPan.y;
            lastPan = {x: e.clientX, y: e.clientY};
        }
        return;
    }
 
    let pos = screenToWorld(e.clientX, e.clientY);
    
    if(appMode === 'edit' && actionState.dragging) {
        actionState.dragging.x = snap(pos.x - actionState.offsetX);
        actionState.dragging.y = snap(pos.y - actionState.offsetY);
        actionState.dragging.updateNodes();
    }
    
    if(appMode === 'wire' && actionState.activeNode) {
        actionState.tempPos = pos;
    }
});
 
canvas.addEventListener('pointerup', handlePointerUp);
canvas.addEventListener('pointercancel', handlePointerUp);
canvas.addEventListener('contextmenu', e => { if(!e.target.closest('.panel')) e.preventDefault(); });
 
function handlePointerUp(e) {
    pointers.delete(e.pointerId);
    if(pointers.size < 2) camera.lastPinchDist = null;
    if(pointers.size === 0) isPanning = false;
 
    if(appMode === 'wire' && actionState.activeNode && actionState.tempPos) {
        let target = null; let pos = actionState.tempPos;
        for(let i = components.length - 1; i >= 0; i--) {
            let c = components[i];
            for(let n of c.nodes) {
                if(n !== actionState.activeNode && n.checkHit(pos)) { target = n; break; }
            }
            if(target) break;
        }
        if(target && !wires.some(w => (w.nodeA===actionState.activeNode && w.nodeB===target) || (w.nodeA===target && w.nodeB===actionState.activeNode))) {
            wires.push(new Wire(actionState.activeNode, target)); logEvent("Wire connected");
        }
    }
    
    actionState.dragging = null; actionState.activeNode = null; actionState.tempPos = null;
}
 
canvas.addEventListener('wheel', e => {
    if(e.target.closest('.panel')) return;
    e.preventDefault();
    let zoomAmount = e.deltaY > 0 ? 0.9 : 1.1;
    let oldZoom = camera.zoom;
    camera.zoom = Math.max(0.4, Math.min(4, camera.zoom * zoomAmount));
    camera.x = e.clientX - (e.clientX - camera.x) * (camera.zoom / oldZoom);
    camera.y = e.clientY - (e.clientY - camera.y) * (camera.zoom / oldZoom);
});
 
// ══════════════════════════════════════════════════════
// 7. Microscopic View 
// ══════════════════════════════════════════════════════
let microActive = false;
let microMolecules = [];
 
window.openMicroscopicView = function() {
    if(!(selectedComp instanceof Capacitor)) return;
    document.getElementById('micro-modal').style.display = 'flex';
    microActive = true;
    
    microMolecules = [];
    for(let i=0; i<80; i++) {
        microMolecules.push({
            x: Math.random() * 0.8 + 0.1, 
            y: Math.random() * 0.8 + 0.1,
            angle: Math.random() * Math.PI * 2, 
            stretch: 0
        });
    }
};
 
window.closeMicroscopicView = function() {
    document.getElementById('micro-modal').style.display = 'none';
    microActive = false;
};
 
function renderMicroscopic(ctx, cap) {
    let w = microCanvas.width = microCanvas.parentElement.clientWidth;
    let h = microCanvas.height = microCanvas.parentElement.clientHeight - 110; 
    
    let mat = DIELECTRICS[cap.matKey];
    document.getElementById('micro-mat').innerText = mat.name;
    document.getElementById('micro-type').innerText = mat.polar ? "Polar" : "Non-Polar";
    
    let vc = cap.capacitance > 0 ? cap.charge/cap.capacitance : 0;
    let eField = (vc / (cap.plateD * 1e-3));
    document.getElementById('micro-efield').innerText = Math.abs(eField).toExponential(2);
    
    ctx.fillStyle = mat.color; ctx.fillRect(0,0,w,h);
    
    ctx.fillStyle = "#cbd5e1";
    ctx.fillRect(0,0, w, 40); 
    ctx.fillRect(0,h-40, w, 40); 
    
    ctx.fillStyle = vc > 0 ? "#ef4444" : "#3b82f6";
    for(let i=20; i<w; i+=40) ctx.fillText(vc>0?"+":"-", i, 25);
    ctx.fillStyle = vc < 0 ? "#ef4444" : "#3b82f6";
    for(let i=20; i<w; i+=40) ctx.fillText(vc<0?"+":"-", i, h-15);
 
    let E = Math.min(Math.abs(vc)/12, 1);
    if(E > 0) {
        ctx.strokeStyle = `rgba(255,255,255,${0.2 + 0.5*E})`;
        ctx.lineWidth = 2;
        let dir = vc > 0 ? 1 : -1;
        for(let i=30; i<w; i+=60) {
            ctx.beginPath(); ctx.moveTo(i, 40); ctx.lineTo(i, h-40); ctx.stroke();
            ctx.beginPath();
            let ay = dir>0 ? h/2 : h/2; 
            let sign = dir>0 ? 1 : -1;
            ctx.moveTo(i, ay + 10*sign); ctx.lineTo(i-8, ay - 10*sign); ctx.lineTo(i+8, ay - 10*sign); ctx.fill();
        }
    }
 
    let normalizedE = Math.min(Math.abs(vc)/5, 1); 
    let targetAngle = vc >= 0 ? Math.PI/2 : -Math.PI/2;
 
    ctx.font = "bold 14px sans-serif";
    microMolecules.forEach(m => {
        let px = m.x * w; let py = 40 + m.y * (h-80);
        ctx.save(); ctx.translate(px, py);
        
        if(mat.polar) {
            document.getElementById('micro-desc').innerText = "المواد القطبية (Polar): الجزيئات تمتلك أقطاب ثابتة، وتدور فيزيائياً لتصطف مع اتجاه المجال الكهربائي العالي.";
            if(normalizedE > 0.05) {
                let diff = targetAngle - m.angle;
                while(diff < -Math.PI) diff += Math.PI*2;
                while(diff > Math.PI) diff -= Math.PI*2;
                m.angle += diff * 0.1 * normalizedE; 
            } else {
                m.angle += (Math.random()-0.5)*0.1; 
            }
            
            ctx.rotate(m.angle);
            let pw = 45, ph = 22;
            ctx.fillStyle = "#ef4444"; ctx.beginPath(); ctx.arc(pw/4, 0, ph/2, 0, Math.PI*2); ctx.fill(); 
            ctx.fillStyle = "#3b82f6"; ctx.beginPath(); ctx.arc(-pw/4, 0, ph/2, 0, Math.PI*2); ctx.fill(); 
            ctx.fillStyle = "white"; ctx.fillText("+", pw/4 - 4, 5); ctx.fillText("-", -pw/4 - 4, 5);
        } else {
            document.getElementById('micro-desc').innerText = "المواد غير القطبية (Non-Polar): الجزيئات تتشوه وتستطيل تحت تأثير المجال لتكوين ديبولات مؤقتة.";
            m.stretch = m.stretch * 0.85 + (normalizedE * 25) * 0.15; 
            
            ctx.rotate(targetAngle);
            ctx.fillStyle = "#94a3b8";
            ctx.beginPath(); ctx.ellipse(0, 0, 15 + m.stretch, 15 - m.stretch*0.4, 0, 0, Math.PI*2); ctx.fill();
            
            if(m.stretch > 3) {
                ctx.fillStyle = "rgba(239, 68, 68, 0.9)"; ctx.fillText("+", m.stretch - 5, 5);
                ctx.fillStyle = "rgba(59, 130, 246, 0.9)"; ctx.fillText("-", -m.stretch - 5, 5);
            } else {
                ctx.fillStyle = "rgba(255,255,255,0.4)"; ctx.beginPath(); ctx.arc(0,0,4,0,Math.PI*2); ctx.fill();
            }
        }
        ctx.restore();
    });
}
 
// ══════════════════════════════════════════════════════
// 8. Main Render Loop
// ══════════════════════════════════════════════════════
let lastTime = Date.now();
 
// ترتيب القطع الأولية بتباعد حتى ما تتراكم
initUI();
spawn(Battery, false); components[0].x -= 150; components[0].updateNodes();
spawn(Switch, false);
spawn(Bulb, false); components[2].x += 150; components[2].updateNodes();
select(null);
 
function loop() {
    let now = Date.now(); let dt = Math.min((now - lastTime)/1000, 0.1); lastTime = now;
 
    Physics.step(components, wires, dt);
 
    ctx.fillStyle = COLORS.BG; ctx.fillRect(0,0,WIDTH,HEIGHT);
    
    ctx.save(); ctx.translate(camera.x, camera.y); ctx.scale(camera.zoom, camera.zoom);
    ctx.fillStyle = COLORS.GRID;
    let sx = -camera.x/camera.zoom; let sy = -camera.y/camera.zoom;
    let ex = sx + WIDTH/camera.zoom; let ey = sy + HEIGHT/camera.zoom;
    for(let x=snap(sx); x<ex; x+=GRID_SIZE) {
        for(let y=snap(sy); y<ey; y+=GRID_SIZE) { ctx.fillRect(x-1, y-1, 2, 2); }
    }
    
    wires.forEach(w => w.draw(ctx));
    
    if(appMode === 'wire' && actionState.activeNode && actionState.tempPos) {
        ctx.strokeStyle = "rgba(0,255,150,0.5)"; ctx.lineWidth = 3; ctx.setLineDash([5,5]);
        ctx.beginPath(); ctx.moveTo(actionState.activeNode.x, actionState.activeNode.y); ctx.lineTo(actionState.tempPos.x, actionState.tempPos.y); ctx.stroke();
        ctx.setLineDash([]);
    }
 
    components.forEach(c => c.draw(ctx));
    
    if(selectedWire) { 
        let pts = selectedWire.getPoints();
        ctx.strokeStyle = "#ef4444"; ctx.lineWidth = 4; ctx.setLineDash([8,8]);
        ctx.beginPath(); ctx.moveTo(pts[0].x, pts[0].y);
        for(let i=1;i<pts.length;i++) ctx.lineTo(pts[i].x, pts[i].y);
        ctx.stroke(); ctx.setLineDash([]);
    }
    ctx.restore();
 
    if(selectedComp && !selectedComp.isBurnt && !(selectedComp instanceof Wire)) {
        document.getElementById('stat-i').innerText = Math.abs(selectedComp.current).toFixed(3) + " A";
        document.getElementById('stat-v').innerText = Math.abs(selectedComp.voltageDrop).toFixed(3) + " V";
        document.getElementById('stat-p').innerText = selectedComp.power.toFixed(3) + " W";
        
        let qText = "0.00 C";
        if(selectedComp instanceof Capacitor) {
            let internalVoltage = selectedComp.capacitance > 0 ? selectedComp.charge / selectedComp.capacitance : 0;
            qText = selectedComp.charge.toExponential(2) + " C (Vc=" + internalVoltage.toFixed(2) + "V)";
        }
        document.getElementById('stat-q').innerText = qText;
    } else if (selectedComp && selectedComp.isBurnt) {
        document.getElementById('stat-i').innerText = "0.00 A";
        document.getElementById('stat-v').innerText = "0.00 V";
        document.getElementById('stat-p').innerText = "0.00 W";
        document.getElementById('stat-q').innerText = "0.00 C";
    }
 
    if(microActive && selectedComp instanceof Capacitor) { renderMicroscopic(microCtx, selectedComp); }
 
    requestAnimationFrame(loop);
}
 
loop();
</script>
